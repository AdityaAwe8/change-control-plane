services:
  postgres:
    image: postgres:16-alpine
    container_name: ccp-reference-pilot-postgres
    environment:
      POSTGRES_DB: change_control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "25432:5432"
    volumes:
      - ccp-reference-pilot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d change_control_plane"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 2s

  redis:
    image: redis:7-alpine
    container_name: ccp-reference-pilot-redis
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 2s

  nats:
    image: nats:2.10-alpine
    container_name: ccp-reference-pilot-nats
    command: ["-js"]
    ports:
      - "24222:4222"
      - "28222:8222"

volumes:
  ccp-reference-pilot-postgres:
