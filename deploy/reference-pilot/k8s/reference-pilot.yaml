apiVersion: v1
kind: Namespace
metadata:
  name: ccp-pilot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: ccp-pilot
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/part-of: ccp-reference-pilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout
        app.kubernetes.io/part-of: ccp-reference-pilot
    spec:
      containers:
        - name: checkout
          image: ccp-reference-pilot-workload:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: REFERENCE_PILOT_SERVICE
              value: checkout
            - name: REFERENCE_PILOT_ENVIRONMENT
              value: pilot
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: ccp-pilot
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/part-of: ccp-reference-pilot
spec:
  selector:
    app.kubernetes.io/name: checkout
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: reference-pilot-prometheus-config
  namespace: ccp-pilot
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    scrape_configs:
      - job_name: checkout
        static_configs:
          - targets:
              - checkout.ccp-pilot.svc.cluster.local:8080
            labels:
              service: checkout
              environment: pilot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reference-pilot-prometheus
  namespace: ccp-pilot
  labels:
    app.kubernetes.io/name: reference-pilot-prometheus
    app.kubernetes.io/part-of: ccp-reference-pilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reference-pilot-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reference-pilot-prometheus
        app.kubernetes.io/part-of: ccp-reference-pilot
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: reference-pilot-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: reference-pilot-prometheus
  namespace: ccp-pilot
  labels:
    app.kubernetes.io/name: reference-pilot-prometheus
    app.kubernetes.io/part-of: ccp-reference-pilot
spec:
  selector:
    app.kubernetes.io/name: reference-pilot-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
