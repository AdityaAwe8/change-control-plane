name: ci

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Format check
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          go build ./cmd/api
          go build ./cmd/worker
          go build ./cmd/cli

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm build
