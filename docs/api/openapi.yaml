        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/rollout-executions/{id}/resume:
    post:
      summary: Resume rollout execution
      description: >
        For live non-simulated backends in advisory mode this returns a validation
        error instead of issuing an external provider resume.
      parameters:
