openapi: 3.1.0
info:
  title: ChangeControlPlane API
  version: 0.1.0
  description: >
    Initial version of the ChangeControlPlane control-plane API for
    organizations, projects, teams, services, environments, changes,
    risk assessments, rollout plans, rollout executions, policies,
    audit events, integrations, service accounts, and machine-token flows.
servers:
  - url: http://localhost:8080
security:
  - BearerAuth: []
paths:
  /healthz:
    get:
      summary: Health probe
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponseItemResponse'
  /readyz:
    get:
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponseItemResponse'
  /api/v1/auth/dev/login:
    post:
      summary: Development bootstrap login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevLoginRequest'
      responses:
        '200':
          description: Session bootstrap issued; browser clients also receive an HttpOnly session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseItemResponse'
  /api/v1/auth/sign-up:
    post:
      summary: Create a password-backed account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: Authenticated session issued; browser clients also receive an HttpOnly session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseItemResponse'
  /api/v1/auth/sign-in:
    post:
      summary: Sign in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Authenticated session issued; browser clients also receive an HttpOnly session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseItemResponse'
  /api/v1/auth/providers:
    get:
      summary: List public enterprise identity providers that are enabled for browser sign-in
      security: []
      responses:
        '200':
          description: Public identity provider list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicIdentityProviderListResponse'
  /api/v1/auth/providers/{id}/start:
    post:
      summary: Start browser sign-in for a specific enterprise identity provider
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityProviderStartRequest'
      responses:
        '200':
          description: Provider authorize URL and callback metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProviderStartResultItemResponse'
  /api/v1/auth/providers/callback:
    get:
      summary: Complete enterprise identity-provider callback and redirect back to the web app
      security: []
      parameters:
        - in: query
          name: state
          required: true
          schema: { type: string }
        - in: query
          name: code
          schema: { type: string }
        - in: query
          name: error
          schema: { type: string }
        - in: query
          name: error_description
          schema: { type: string }
      responses:
        '200':
          description: Authenticated session response for internal callback flows that do not carry a stored return target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseItemResponse'
        '302':
          description: Redirect back to the caller after establishing the browser session cookie; the redirect no longer carries a bearer token in the URL
  /api/v1/auth/session:
    get:
      summary: Resolve the current session for bearer-token or browser-cookie auth
      responses:
        '200':
          description: Session information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfoItemResponse'
  /api/v1/auth/logout:
    post:
      summary: Invalidate the current browser session and clear the session cookie
      security: []
      responses:
        '200':
          description: Anonymous session after logout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfoItemResponse'
  /api/v1/catalog:
    get:
      summary: Combined service and environment catalog summary
      responses:
        '200':
          description: Catalog summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogSummaryItemResponse'
  /api/v1/metrics/basics:
    get:
      summary: Basic control-plane counts
      responses:
        '200':
          description: Basic metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicMetricsItemResponse'
  /api/v1/organizations:
    get:
      summary: List organizations
      responses:
        '200':
          description: Organization list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/organizations/{id}:
    get:
      summary: Get organization detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Organization detail
          content:
            application/json:
