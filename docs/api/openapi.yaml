components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: CCP-HMAC
  responses:
    ValidationError:
      description: Validation or malformed request error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Missing, invalid, or expired authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Authenticated, but not permitted for the requested organization or resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found in the active tenant scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    DevLoginRequest:
      type: object
      required: [email, display_name]
      properties:
        email:
          type: string
        display_name:
          type: string
        organization_name:
          type: string
        organization_slug:
          type: string
    CreateOrganizationRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        tier:
          type: string
