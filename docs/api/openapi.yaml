  /api/v1/rollout-executions/{id}/advance:
    post:
      summary: Advance rollout execution lifecycle
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceRolloutExecutionRequest'
      responses:
        '200':
          description: Rollout execution advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolloutExecutionItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/rollout-executions/{id}/pause:
    post:
      summary: Pause rollout execution
      description: >
        For live non-simulated backends in advisory mode this returns a validation
        error instead of issuing an external provider pause.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: reason
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolloutActionRequest'
      responses:
        '200':
          description: Rollout execution paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolloutExecutionItemResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
